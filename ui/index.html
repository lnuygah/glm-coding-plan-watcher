<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GLM Plan Watcher</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="toolbar">
        <div>
          <h1>GLM Plan Watcher</h1>
          <p data-i18n="appSubtitle">后台 headless 监控；登录和命中付款衔接才打开可见浏览器。</p>
        </div>
        <div class="connection">
          <label>
            <span data-i18n="languageLabel">Language</span>
            <select id="language-select">
              <option value="zh-CN">简体中文</option>
              <option value="en">English</option>
            </select>
          </label>
          <details class="advanced">
            <summary data-i18n="advancedLabel">高级/诊断</summary>
            <label>
              <span data-i18n="daemonLabel">Daemon</span>
              <input id="daemon-url" value="http://127.0.0.1:8765" />
            </label>
            <label>
              <span data-i18n="tokenLabel">Token</span>
              <input id="daemon-token" type="password" autocomplete="off" />
            </label>
          </details>
        </div>
      </section>

      <section class="notice" data-i18n="notice">
        可为每个 target 配置开售窗口与快刷间隔。过低间隔可能触发限流/风控，反而买不到；Handoff 只打开可见浏览器并可点击一次购买入口，后续支付必须人工确认。
      </section>

      <section id="status" class="status" hidden></section>

      <section class="grid">
        <div class="panel">
          <div class="panel-header">
            <h2 data-i18n="accountsTitle">Accounts</h2>
            <button id="refresh" data-i18n="refreshButton">Refresh</button>
          </div>
          <p class="first-run-guide" data-i18n="firstRunGuide">
            ① 登录 → ② 加任务 → ③ 开始监控
          </p>
          <form id="account-form" class="form-row">
            <input
              name="display_name"
              placeholder="Account name"
              data-i18n-placeholder="accountNamePlaceholder"
              required
            />
            <input
              name="user_data_dir"
              placeholder="可选：留空自动管理（导入已有 profile 请填绝对路径）"
              data-i18n-placeholder="profilePlaceholder"
            />
            <button type="submit" data-i18n="addAccountButton">Add</button>
          </form>
          <div id="accounts" class="list"></div>
        </div>

        <div class="panel">
          <div class="panel-header events-panel-header">
            <h2 data-i18n="eventsTitle">Events</h2>
            <div class="event-filter" role="group" aria-label="Event filter">
              <button id="events-filter-all" type="button" data-i18n="evtFilterAll">全部</button>
              <button id="events-filter-important" type="button" data-i18n="evtFilterImportant">
                只看重要
              </button>
              <label class="event-account-filter">
                <span data-i18n="evtAccountFilterLabel">账号</span>
                <select id="events-filter-account"></select>
              </label>
            </div>
          </div>
          <p id="events-empty" class="events-empty" data-i18n="eventsEmpty">暂无事件</p>
          <div id="events" class="events"></div>
        </div>
      </section>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
