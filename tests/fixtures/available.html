<!doctype html>
<!--
  真实可购买 fixture：按钮 DOM 来自 bigmodel GLM Coding 页面快照（2026-06-17，三档均可购买）。
  通过 `glm-plan debug-selectors` 抓取校准；当时三档按钮文案均为「特惠订阅」，Pro 额外带 special class。
  原始样本：
  Lite/Max: <button class="el-button el-tooltip buy-btn el-button--primary" name="特惠订阅"><span>特惠订阅</span></button>
  Pro:      <button class="el-button el-tooltip buy-btn el-button--primary special" name="特惠订阅"><span>特惠订阅</span></button>
-->
<html lang="zh-CN">
  <body>
    <div id="switchTabBox" class="switch-tab-box">
      <div class="switch-tab-content">
        <div class="switch-tab-item active">
          <div class="switch-tab-item-content"><span>连续包月</span></div>
        </div>
        <div class="switch-tab-item">
          <div class="switch-tab-item-content"><span>连续包季</span><span class="discount-tip"> 9折 </span></div>
        </div>
        <div class="switch-tab-item">
          <div class="switch-tab-item-content"><span>连续包年</span><span class="discount-tip"> 8折 </span></div>
        </div>
      </div>
    </div>

    <div class="package-list glm-coding-package-list">
      <div class="package-card-box">
        <div class="package-card">
          <div class="package-card-title"><span class="font-prompt">Lite</span></div>
          <div class="package-card-btn-box">
            <button type="button" class="el-button el-tooltip buy-btn el-button--primary" name="特惠订阅"><span>特惠订阅</span></button>
          </div>
        </div>
      </div>
      <div class="package-card-box">
        <div class="package-card">
          <div class="package-card-title"><span class="font-prompt">Pro</span></div>
          <div class="package-card-btn-box">
            <button type="button" class="el-button el-tooltip buy-btn el-button--primary special" name="特惠订阅"><span>特惠订阅</span></button>
          </div>
        </div>
      </div>
      <div class="package-card-box">
        <div class="package-card">
          <div class="package-card-title"><span class="font-prompt">Max</span></div>
          <div class="package-card-btn-box">
            <button type="button" class="el-button el-tooltip buy-btn el-button--primary" name="特惠订阅"><span>特惠订阅</span></button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
